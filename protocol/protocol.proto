edition = "2024";

package br.dev.purpura.study.grpc;

option go_package = "purpura.dev.br/study/service/protocol";

message GetRequest {
  string name = 1;
}

message GetResponse {
  string value = 1;
}

message SetRequest {
  string name = 1;
  string value = 2;
}

message SetResponse {
}

message ClearRequest {
  string name = 1;
}

message ClearResponse {

}

service Protocol {
  rpc Get (GetRequest) returns (GetResponse) { }
  rpc Set (SetRequest) returns (SetResponse) { }
  rpc Clear (ClearRequest) returns (ClearResponse) { }
}